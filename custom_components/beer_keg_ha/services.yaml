cleanup_entities:
  name: Cleanup Stale Entities
  description: Remove entity registry entries from previous versions that are no longer provided by the integration

delete_keg:
  name: Delete Keg
  description: Permanently delete a keg and all its data from the server, and remove all its HA entities
  fields:
    id:
      name: Keg ID
      required: true
      selector:
        text:

export_history:
  name: Export History
  description: Write pour history to /config/www/beer_keg_history.json (served at /local/beer_keg_history.json)

refresh_kegs:
  name: Refresh Kegs (REST)
  description: Pull the latest keg data from the REST API and update sensors

republish_all:
  name: Republish All
  description: Re-fire update events for all known kegs

refresh_devices:
  name: Refresh Device List
  description: Query /api/kegs/devices to update the device selector

calibrate_keg:
  name: Calibrate Keg
  description: Send calibration payload to /api/kegs/calibrate

set_display_units:
  name: Set Display Units
  description: Update dashboard display units for weight and temperature
  fields:
    weight_unit:
      name: Weight unit
      required: false
      selector:
        select:
          options: [kg, lb]
    temp_unit:
      name: Temperature unit
      required: false
      selector:
        select:
          options: ["°C", "°F"]

# ------------------------------------------------------------
# Keg Command API (new server; graceful 404 on old server)
# If you omit `id`, the integration uses select.keg_device

keg_tare:
  name: Tare Scale
  description: POST /api/kegs/:id/tare
  fields:
    id:
      name: Keg ID
      required: false
      selector:
        text:

keg_set_empty_keg_weight:
  name: Set Empty Keg Weight
  description: POST /api/kegs/:id/empty-keg-weight
  fields:
    id:
      name: Keg ID
      required: false
      selector:
        text:
    value:
      name: Empty keg weight (kg)
      required: true
      selector:
        number:
          min: 0
          max: 50
          step: 0.01

keg_set_max_keg_volume:
  name: Set Max Keg Volume
  description: POST /api/kegs/:id/max-keg-volume
  fields:
    id:
      name: Keg ID
      required: false
      selector:
        text:
    value:
      name: Max volume (liters)
      required: true
      selector:
        number:
          min: 0
          max: 100
          step: 0.01

keg_set_temperature_offset:
  name: Set Temperature Offset
  description: POST /api/kegs/:id/temperature-offset
  fields:
    id:
      name: Keg ID
      required: false
      selector:
        text:
    value:
      name: Temperature offset (°C)
      required: true
      selector:
        number:
          min: -20
          max: 20
          step: 0.1

keg_calibrate_known_weight:
  name: Calibrate With Known Weight
  description: POST /api/kegs/:id/calibrate-known-weight
  fields:
    id:
      name: Keg ID
      required: false
      selector:
        text:
    value:
      name: Known weight (kg)
      required: true
      selector:
        number:
          min: 0
          max: 100
          step: 0.01

keg_set_beer_style:
  name: Set Beer Style
  description: POST /api/kegs/:id/beer-style
  fields:
    id:
      name: Keg ID
      required: false
      selector:
        text:
    value:
      name: Beer style
      required: true
      selector:
        text:

keg_set_date:
  name: Set Keg Date
  description: POST /api/kegs/:id/date
  fields:
    id:
      name: Keg ID
      required: false
      selector:
        text:
    value:
      name: Date string (YYYY-MM-DD recommended)
      required: true
      selector:
        text:

keg_set_unit_system:
  name: Set Unit System
  description: POST /api/kegs/:id/unit
  fields:
    id:
      name: Keg ID
      required: false
      selector:
        text:
    value:
      name: Unit system
      required: true
      selector:
        select:
          options: [metric, us]

keg_set_measure_unit:
  name: Set Measure Mode
  description: POST /api/kegs/:id/measure-unit
  fields:
    id:
      name: Keg ID
      required: false
      selector:
        text:
    value:
      name: Measure mode
      required: true
      selector:
        select:
          options: [weight, volume]

keg_set_mode:
  name: Set Keg Mode
  description: POST /api/kegs/:id/keg-mode
  fields:
    id:
      name: Keg ID
      required: false
      selector:
        text:
    value:
      name: Keg mode
      required: true
      selector:
        select:
          options: [beer, co2]

keg_set_sensitivity:
  name: Set Sensitivity
  description: POST /api/kegs/:id/sensitivity
  fields:
    id:
      name: Keg ID
      required: false
      selector:
        text:
    value:
      name: Sensitivity
      required: true
      selector:
        number:
          min: 0
          max: 10
          step: 1

# ------------------------------------------------------------
# Airlock services

set_airlock_label:
  name: Set Airlock Label
  description: POST /api/airlocks/:id/label — set a human-readable label for an airlock
  fields:
    airlock_id:
      name: Airlock ID
      required: true
      selector:
        text:
    label:
      name: Label
      required: true
      selector:
        text:

configure_grainfather:
  name: Configure Grainfather
  description: POST /api/airlocks/:id/grainfather — enable/disable and configure Grainfather forwarding
  fields:
    airlock_id:
      name: Airlock ID
      required: true
      selector:
        text:
    enabled:
      name: Enabled
      required: true
      selector:
        boolean:
    url:
      name: Grainfather URL
      required: false
      selector:
        text:
    unit:
      name: Temperature unit
      required: false
      selector:
        select:
          options: [celsius, fahrenheit]
    specific_gravity:
      name: Specific gravity
      required: false
      selector:
        number:
          min: 0.9
          max: 1.2
          step: 0.001

configure_brewfather:
  name: Configure Brewfather
  description: POST /api/airlocks/:id/brewfather — enable/disable and configure Brewfather forwarding
  fields:
    airlock_id:
      name: Airlock ID
      required: true
      selector:
        text:
    enabled:
      name: Enabled
      required: true
      selector:
        boolean:
    url:
      name: Brewfather custom stream URL
      required: false
      selector:
        text:
    unit:
      name: Temperature unit
      required: false
      selector:
        select:
          options: [celsius, fahrenheit]
    specific_gravity:
      name: Current SG
      required: false
      selector:
        number:
          min: 0.9
          max: 1.2
          step: 0.001
    og:
      name: Original gravity (OG)
      required: false
      selector:
        text:
    batch_volume:
      name: Batch volume (L)
      required: false
      selector:
        number:
          min: 0
          max: 200
          step: 0.1
